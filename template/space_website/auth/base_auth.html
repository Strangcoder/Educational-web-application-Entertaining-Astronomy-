<script>
    let mod = document.getElementById('mode_auth');
    let inp1 = document.getElementById('inp1');
    let inp2 = document.getElementById('inp2');
    let link = inp2.querySelector('a');
    if ('{{mode}}' == 'login'){
        mod.classList.add('login');
        inp1.value = 'ВОЙТИ';
        link.textContent = 'ЗАРЕГИСТРИРОВАТЬСЯ';
        link.href = '/';
        inp1.classList.add('login');
        inp2.classList.add('login');
    }
    else{
        mod.classList.remove('login');
        inp1.classList.remove('login');
        inp2.classList.remove('login');
    }
</script>

<script>
const coord = document.getElementById('coord');

let current = +coord.textContent; // текущее число
let target = randomValue();       // новое число

function randomValue() {
    return +(1000000 + Math.random() * 9000000).toFixed(2);
}

function animate() {
    const duration = 15000; // медленнее, длительность анимации в мс
    const startTime = performance.now();

    function step(time) {
        const progress = Math.min((time - startTime) / duration, 1);
        const value = current + (target - current) * progress;
        coord.textContent = value.toFixed(2);

        if (progress < 1) {
            requestAnimationFrame(step);
        } else {
            current = target;
            target = randomValue();
            requestAnimationFrame(animate);
        }
    }

    requestAnimationFrame(step);
}

animate();
</script>
